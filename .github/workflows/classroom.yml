name: Autograding Tests
'on':
  push:
  workflow_dispatch:
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: github.actor != 'github-classroom[bot]'
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4

    - name: Compile
      run: 'g++ -std=c++17 -o main *.cpp'

    - name: Stash expected test outputs
      run: |
        echo 'U2NpZW5jZSBRdWl6OiA5MiBwb2ludHMKTWF0aCBIb21ld29yazogODUgcG9pbnRzCkhpc3RvcnkgRXNzYXk6IDc4IHBvaW50cw==' | base64 -d > /tmp/expected_basicsortingfunctionalitywithmultipleassignments.txt
        echo 'RmluYWwgUHJvamVjdDogOTUgcG9pbnRzCk1pZHRlcm0gRXhhbTogODggcG9pbnRz' | base64 -d > /tmp/expected_parallelvectorsstoreassignmentnamescorrectly.txt
        echo 'T25seSBBc3NpZ25tZW50OiA3NSBwb2ludHM=' | base64 -d > /tmp/expected_singleassignmenthandling.txt
        echo 'QXNzaWdubWVudCBBOiAxMDAgcG9pbnRzCkFzc2lnbm1lbnQgQjogMTAwIHBvaW50cwpBc3NpZ25tZW50IEM6IDEwMCBwb2ludHM=' | base64 -d > /tmp/expected_sortingwithidenticalscores.txt

    - name: basicsortingfunctionalitywithmultipleassignments
      id: basicsortingfunctionalitywithmultipleassignments
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Basic sorting functionality with multiple assignments"
        command: |
          printf '%b' '200\n180\n160\n140\n120\n85\nMath Homework\n92\nScience Quiz\n78\nHistory Essay\n-1\n' | ./main 2>/dev/null | node -e 'const fs=require("fs"),r=s=>s.replace(/[\s\r\n]+$/,"");const a=r(fs.readFileSync(0,"utf8")),e=r(process.argv[1]?fs.readFileSync(process.argv[1],"utf8"):process.argv[2]||"");process.exit(a.includes(e)?0:1);' /tmp/expected_basicsortingfunctionalitywithmultipleassignments.txt
        timeout: 10
        max-score: 33

    - name: parallelvectorsstoreassignmentnamescorrectly
      id: parallelvectorsstoreassignmentnamescorrectly
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Parallel vectors store assignment names correctly"
        command: |
          printf '%b' '100\n90\n80\n70\n60\n95\nFinal Project\n88\nMidterm Exam\n-1\n' | ./main 2>/dev/null | node -e 'const fs=require("fs"),r=s=>s.replace(/[\s\r\n]+$/,"");const a=r(fs.readFileSync(0,"utf8")),e=r(process.argv[1]?fs.readFileSync(process.argv[1],"utf8"):process.argv[2]||"");process.exit(a.includes(e)?0:1);' /tmp/expected_parallelvectorsstoreassignmentnamescorrectly.txt
        timeout: 10
        max-score: 28

    - name: singleassignmenthandling
      id: singleassignmenthandling
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Single assignment handling"
        command: |
          printf '%b' '100\n90\n80\n70\n60\n75\nOnly Assignment\n-1\n' | ./main 2>/dev/null | node -e 'const fs=require("fs"),r=s=>s.replace(/[\s\r\n]+$/,"");const a=r(fs.readFileSync(0,"utf8")),e=r(process.argv[1]?fs.readFileSync(process.argv[1],"utf8"):process.argv[2]||"");process.exit(a.includes(e)?0:1);' /tmp/expected_singleassignmenthandling.txt
        timeout: 10
        max-score: 17

    - name: sortingwithidenticalscores
      id: sortingwithidenticalscores
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: "Sorting with identical scores"
        command: |
          printf '%b' '150\n135\n120\n105\n90\n100\nAssignment A\n100\nAssignment B\n100\nAssignment C\n-1\n' | ./main 2>/dev/null | node -e 'const fs=require("fs"),r=s=>s.replace(/[\s\r\n]+$/,"");const a=r(fs.readFileSync(0,"utf8")),e=r(process.argv[1]?fs.readFileSync(process.argv[1],"utf8"):process.argv[2]||"");process.exit(a.includes(e)?0:1);' /tmp/expected_sortingwithidenticalscores.txt
        timeout: 10
        max-score: 22
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        BASICSORTINGFUNCTIONALITYWITHMULTIPLEASSIGNMENTS_RESULTS: "${{ steps.basicsortingfunctionalitywithmultipleassignments.outputs.result }}"
        PARALLELVECTORSSTOREASSIGNMENTNAMESCORRECTLY_RESULTS: "${{ steps.parallelvectorsstoreassignmentnamescorrectly.outputs.result }}"
        SINGLEASSIGNMENTHANDLING_RESULTS: "${{ steps.singleassignmenthandling.outputs.result }}"
        SORTINGWITHIDENTICALSCORES_RESULTS: "${{ steps.sortingwithidenticalscores.outputs.result }}"
      with:
        runners: basicsortingfunctionalitywithmultipleassignments,parallelvectorsstoreassignmentnamescorrectly,singleassignmenthandling,sortingwithidenticalscores
